[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Next.js runtime — handles SSR, API routes, and ISR on Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Allow embedding in the Merchant Center custom app (iframe)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOW-FROM https://dashboard-alpha-tan-44.vercel.app"
    Content-Security-Policy = "frame-ancestors 'self' https://dashboard-alpha-tan-44.vercel.app"

# API routes must never be cached
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"
